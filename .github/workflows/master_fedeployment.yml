name: Build and deploy Next.js to Azure App Service

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  NODE_VERSION: "22"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Prepare deployment package
        run: |
          mkdir deploy

          cp package.json deploy/
          cp package-lock.json deploy/

          cp -R public deploy/public

          cp -R build/standalone/* deploy/

          mkdir -p deploy/build
          cp -R build/static deploy/build/static

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: fedeployment
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_98FA778C83DF44188BC8FE6730942958 }}
          package: .
