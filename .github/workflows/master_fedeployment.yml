# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - fedeployment

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  NODE_VERSION: "22"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Prepare deployment package
        run: |
          if [ ! -d build/standalone ]; then
            echo "build/standalone not found. Ensure next.config.ts has output: 'standalone'."
            ls -la build || true
            exit 1
          fi

          mkdir deploy
          cp package.json deploy/
          cp package-lock.json deploy/
          cp -R public deploy/public
          cp -R build/standalone/. deploy/
          mkdir -p deploy/build
          cp -R build/static deploy/build/static

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: fedeployment
          slot-name: Production
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_377BD045A143462ABB8A45D11E930BC9 }}
